name: Ruock Release

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: macos-26

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.2'

      - name: Build Archive
        run: |
          mkdir -p build
          xcodebuild -scheme Ruock -configuration Release \
            -arch x86_64 -arch arm64 \
            -archivePath build/Ruock.xcarchive archive \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO
          cp -R build/Ruock.xcarchive/Products/Applications/Ruock.app build/Ruock.app

      - name: Add CLI
        run: cp cli/ruock-cli build/ruock-cli

      - name: Clean quarantine attributes
        run: |
          xattr -cr build/Ruock.app
          xattr -cr build/ruock-cli

      - name: Ad-hoc sign the app
        run: codesign --force --deep --sign - build/Ruock.app

      - name: Verify quarantine removal and signature
        run: |
          echo "Checking for quarantine attributes..."

          if xattr -p com.apple.quarantine build/Ruock.app; then
            echo "Error: Ruock.app still has quarantine attribute!" >&2
          exit 1
          else
            echo "✅ Ruock.app is clean."
          fi

          if xattr -p com.apple.quarantine build/ruock-cli; then
            echo "Error: ruock-cli still has quarantine attribute!" >&2
            exit 1
          else
            echo "✅ ruock-cli is clean."
          fi

          echo "Checking ad-hoc code signature..."

          if codesign --verify --deep --strict build/Ruock.app; then
            echo "✅ Ruock.app signature is valid."
          else
            echo "Error: Ruock.app signature verification failed!" >&2
            exit 1
          fi

      - name: Zip with version
        run: |
          cd build
          ZIP_NAME="Ruock-${{ github.ref_name }}.zip"
          zip -r "$ZIP_NAME" Ruock.app ruock-cli
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV

      - name: Upload release artifact
        uses: softprops/action-gh-release@v1
        with:
          files: build/${{ env.ZIP_NAME }}
          body_path: docs/releases/${{ github.ref_name }}.md
          token: ${{ secrets.GITHUB_TOKEN }}
